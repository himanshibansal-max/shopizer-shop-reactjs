name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [16.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install --legacy-peer-deps
    
    - name: Run linting
      run: npm run lint || echo "No lint script found"
      continue-on-error: true
    
    - name: Run tests
      run: npm test -- --watchAll=false --passWithNoTests || echo "No tests found"
      continue-on-error: true
    
    - name: Build application
      run: npm run build
      env:
        CI: false
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ github.sha }}
        path: build/
        retention-days: 30
    
    - name: Create deployment package
      run: |
        cd build
        tar -czf ../shopizer-shop-build.tar.gz .
        cd ..
    
    - name: Upload deployment package
      uses: actions/upload-artifact@v4
      with:
        name: deployment-package
        path: shopizer-shop-build.tar.gz
        retention-days: 30
    
    - name: Generate build info
      run: |
        echo "Build Date: $(date)" > build-info.txt
        echo "Commit: ${{ github.sha }}" >> build-info.txt
        echo "Branch: ${{ github.ref_name }}" >> build-info.txt
        echo "Node Version: $(node --version)" >> build-info.txt
    
    - name: Upload build info
      uses: actions/upload-artifact@v4
      with:
        name: build-info
        path: build-info.txt
        retention-days: 30

  debug-check:
    runs-on: ubuntu-latest
    needs: test-and-build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 16.x
    
    - name: Install dependencies
      run: npm install --legacy-peer-deps
    
    - name: Install Playwright
      run: npx playwright install chromium
    
    - name: Start backend mock (if needed)
      run: echo "Backend should be running separately"
    
    - name: Run debug tool
      run: node debug-tool.js || echo "Debug tool check completed"
      continue-on-error: true
    
    - name: Upload error report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: error-report
        path: |
          frontend-errors.json
          frontend-errors.png
        retention-days: 7
